<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Resume Rank{% endblock %}</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    {% block extra_head %}{% endblock %}
</head>
<body class="{% block body_class %}page-body theme-sunrise{% endblock %}">
    <div class="ambient-canvas" aria-hidden="true">
        <span class="ambient-orb orb-one"></span>
        <span class="ambient-orb orb-two"></span>
        <span class="ambient-orb orb-three"></span>
        <span class="ambient-ring ring-one"></span>
        <span class="ambient-grid"></span>
    </div>
    {% block body %}{% endblock %}
    {% block scripts %}{% endblock %}
</body>
</html>
